services:
  web:
    build:
      target: app
    command: npm run local:dev
    depends_on:
      - mariadb
    develop:
      watch:
        - path: ./app
          action: sync
          target: /app/app
        - path: ./components
          action: sync
          target: /app/components
        - path: ./lib
          action: sync
          target: /app/lib
        - path: ./public
          action: sync
          target: /app/public
        - action: rebuild
          path: package.json
        - action: rebuild
          path: package-lock.json
        - action: rebuild
          path: next.config.mjs
        - action: rebuild
          path: tsconfig.json
    environment:
      - NODE_ENV=development
      - DATABASE_URL=mysql://root:${DB_PASSWORD}@mariadb/${DB_DATABASE}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - ENABLE_LOCAL_AUTH=${ENABLE_LOCAL_AUTH}
      - ENABLE_PASSWORD_STRENGTH_CHECK=${ENABLE_PASSWORD_STRENGTH_CHECK}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - OAUTH_PROVIDER_ID=${OAUTH_PROVIDER_ID}
      - OAUTH_SCOPES=${OAUTH_SCOPES}
      - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID}
      - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET}
      - OAUTH_AUTHORIZATION_URL=${OAUTH_AUTHORIZATION_URL}
      - OAUTH_TOKEN_URL=${OAUTH_TOKEN_URL}
      - OAUTH_USERINFO_URL=${OAUTH_USERINFO_URL}
      - OAUTH_DISCOVERY_URL=${OAUTH_DISCOVERY_URL}


  mariadb:
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
