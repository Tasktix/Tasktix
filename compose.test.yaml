services:
  web:
    depends_on:
      deploy:
        condition: service_healthy

  mariadb:
    healthcheck:
      test:
        [
          'CMD',
          'mariadb-admin',
          'ping',
          '-h',
          'localhost',
          '-u',
          'root',
          '-p${DB_PASSWORD}'
        ]
      interval: 2s
      timeout: 1s
      retries: 5
      start_period: 2s

  deploy:
    build:
      context: .
      dockerfile: Dockerfile.deploy
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://root:${DB_PASSWORD}@mariadb/${DB_DATABASE}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      DISABLE_AUTH_RATE_LIMIT: ${DISABLE_AUTH_RATE_LIMIT}
      DISABLE_PASSWORD_STRENGTH_CHECK: true # Disabled for seed scripts (n.b. this is only the deploy container)
      KEEP_ALIVE: true
    healthcheck:
      test: ['CMD', 'test', '-f', '/tmp/prisma-ready']
      interval: 2s
      timeout: 1s
      retries: 10
      start_period: 5s
